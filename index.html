<meta charset="UTF-8">

<style>

/* FIX GLOBAL */
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

/* VARIABLES */
:root {
    --primary: #d4af37;
    --primary-dark: #b88a2a;
    --accent: #f43f5e;
    --glass: rgba(255, 255, 255, 0.65);
}

/* BODY */
body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #f7f1e8, #e8dccb);
    color: #2b2b2b;
}

/* WRAPPER */
.wrapper {
    max-width: 900px;
    margin: auto;
    padding: 15px;
    text-align: center;
}

/* HERO */
.hero, .bottom-section {
    background: var(--glass);
    backdrop-filter: blur(15px);
    padding: 40px 20px;
    border-radius: 30px;
}

/* TITULOS */
h1 {
    font-family: 'Playfair Display', serif;
}

/* PRECIOS */
.old { text-decoration: line-through; color: #999; }
.new { font-size: 48px; color: var(--primary); font-weight: 800; }

/* BOTÓN */
.btn {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white !important;
    padding: 20px 35px;
    border-radius: 100px;
    text-decoration: none;
    font-weight: 800;
    display: inline-block;
    animation: pulse 2.5s infinite;
}

@keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

/* IMÁGENES */
img {
    max-width: 100%;
    display: block;
    margin: auto;
}

/* VIDEO */
video {
    width: 100%;
    border-radius: 20px;
}

/* FAQ */
.faq-container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 20px;
}

.faq-item {
    border-bottom: 1px solid #eee;
    padding: 15px 0;
    cursor: pointer;
}

.faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
}

.faq-item.active .faq-answer {
    max-height: 200px;
}

/* WHATSAPP */
.whatsapp-container {
    position: fixed;
    right: 18px;
    bottom: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* POPUP */
.sale-popup {
    position: fixed;
    left: 18px;
    bottom: 95px;
    background: white;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
    z-index: 9999;
}

.sale-popup.show {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

onclick="btm_track_checkout(event, this.href)">
QUIERO INSCRIBIRME AHORA
</a>

</div>
