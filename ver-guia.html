<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizando Guía - Velas Artesanales</title>
    <style>
        /* Usamos tu paleta Premium */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background: #f4f1ea; /* El color arena de tu landing */
            font-family: 'Montserrat', sans-serif;
        }

        /* Contenedor del PDF */
        .pdf-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Barra superior elegante por si tarda en cargar */
        .top-bar {
            background: white;
            padding: 10px;
            text-align: center;
            color: #b88a2a; /* Tu dorado Premium */
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid rgba(184, 138, 42, 0.2);
        }

        iframe { 
            flex-grow: 1;
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <div class="top-bar">📜 ESTUDIO DIGITAL - VELAS DE GEL</div>
        <iframe src="estudio-digital.pdf"></iframe>
    </div>
</body>
</html>
