<style>

/* =========================
   FIX GLOBAL (IMPORTANTE)
========================= */
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    width: 100%;
}

/* =========================
   VARIABLES
========================= */
:root {
    --primary: #d4af37;
    --primary-dark: #b88a2a;
    --accent: #f43f5e;
    --glass: rgba(255, 255, 255, 0.65);
}

/* =========================
   BODY
========================= */
body { 
    font-family: 'Montserrat', sans-serif; 
    background: radial-gradient(circle at top, rgba(255,255,255,0.7), transparent 60%),
                linear-gradient(135deg, #f7f1e8, #e8dccb);
    background-size: cover;
    color: #2b2b2b;
    overflow-x: hidden;
}

/* =========================
   WRAPPER
========================= */
.wrapper {
    max-width: 900px;
    width: 100%;
    margin: auto;
    padding: 15px;
    text-align: center;
}

/* =========================
   HERO Y SECCIONES
========================= */
.hero, .bottom-section { 
    background: var(--glass); 
    backdrop-filter: blur(15px); 
    -webkit-backdrop-filter: blur(15px);
    padding: 40px 20px; 
    border-radius: 30px; 
    border: 1px solid rgba(255,255,255,0.6); 
}

/* =========================
   TIPOGRAFÍA
========================= */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 5vw, 48px);
}

.old {
    text-decoration: line-through;
    color: #9ca3af;
    font-size: 18px;
}

.new {
    font-size: clamp(40px, 8vw, 60px);
    color: var(--primary);
    font-weight: 800;
}

/* =========================
   BOTÓN PRINCIPAL
========================= */
.btn { 
    background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
    color: white !important; 
    padding: 20px 35px; 
    border-radius: 100px; 
    text-decoration: none; 
    font-weight: 800; 
    display: inline-block; 
    transition: 0.3s; 
    position: relative;
    overflow: hidden;
    animation: pulseSoft 2.5s ease-in-out infinite;
}

@keyframes pulseSoft {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.02); }
}

/* =========================
   IMÁGENES
========================= */
img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
}

/* =========================
   VIDEO
========================= */
video {
    width: 100%;
    display: block;
    border-radius: 20px;
}

/* =========================
   FAQ
========================= */
.faq-container {
    max-width: 700px;
    margin: 25px auto;
    background: white;
    border-radius: 20px;
    padding: 10px 20px;
}

.faq-item {
    border-bottom: 1px solid #eee;
    padding: 15px 0;
    cursor: pointer;
}

.faq-question {
    font-weight: 700;
}

.faq-answer {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: 0.3s;
}

.faq-item.active .faq-answer {
    max-height: 200px;
    opacity: 1;
}

/* =========================
   WHATSAPP
========================= */
.whatsapp-container {
    position: fixed;
    right: 18px;
    bottom: 20px;
    z-index: 999999;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* =========================
   POPUP
========================= */
.sale-popup {
    position: fixed;
    left: 18px;
    bottom: 95px;
    z-index: 999999;
    background: rgba(255,255,255,0.92);
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
}

.sale-popup.show {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>
